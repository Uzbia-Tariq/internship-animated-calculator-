<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator Tailwind</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="output.css">
</head>

<body class="bg-gradient-to-r from-blue-600 to-cyan-400 min-h-screen flex items-center justify-center">

    <div class="bg-white w-[420px] p-8 rounded-3xl shadow-2xl">

        <!-- Display -->
        <input
            type="text"
            placeholder="2.1+3.1"
            readonly
            class="w-full h-16 bg-gray-200 rounded-xl text-right text-3xl px-4 outline-none mb-6">

        <!-- Operators -->
        <div class="grid grid-cols-4 gap-4 mb-6">

            <button class="bg-yellow-300 rounded-xl h-16 text-3xl hover:bg-yellow-400">+</button>

            <button class="bg-yellow-300 rounded-xl h-16 text-3xl hover:bg-yellow-400">−</button>

            <button class="bg-yellow-300 rounded-xl h-16 text-3xl hover:bg-yellow-400">×</button>

            <button class="bg-yellow-300 rounded-xl h-16 text-3xl hover:bg-yellow-400">÷</button>

        </div>

        <!-- Numbers -->

        <div class="grid grid-cols-4 gap-4">

            <button class="bg-blue-200 rounded-xl h-16 text-3xl">7</button>
            <button class="bg-blue-200 rounded-xl h-16 text-3xl">8</button>
            <button class="bg-blue-200 rounded-xl h-16 text-3xl">9</button>
            <button class="bg-blue-200 rounded-xl h-16 text-3xl">4</button>

            <button class="bg-blue-200 rounded-xl h-16 text-3xl">5</button>
            <button class="bg-blue-200 rounded-xl h-16 text-3xl">6</button>
            <button class="bg-blue-200 rounded-xl h-16 text-3xl">1</button>
            <button class="bg-blue-200 rounded-xl h-16 text-3xl">2</button>

            <button class="bg-blue-200 rounded-xl h-16 text-3xl">3</button>
            <button class="bg-blue-200 rounded-xl h-16 text-3xl">0</button>
            <button class="bg-blue-200 rounded-xl h-16 text-3xl">.</button>

            <button class="bg-red-500 text-white rounded-xl h-16 text-3xl hover:bg-red-600">
                C
            </button>

        </div>

        <!-- Equal Button -->

        <button
            class="w-full bg-emerald-500 text-white text-4xl rounded-xl h-16 mt-6 hover:bg-emerald-600">
            =
        </button>

    </div>

</body>
</html>
