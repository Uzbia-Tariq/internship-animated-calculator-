<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwind Calculator</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="input.css">
</head>

<body class="min-h-screen bg-gradient-to-r from-blue-600 to-cyan-400 flex items-center justify-center">

    <!-- Calculator -->
    <div class="animate-calculator bg-white w-[420px] rounded-3xl shadow-2xl p-8">

        <!-- Display -->
        <input
            type="text"
            placeholder="2.1 + 3.1"
            readonly
            class="animate-display w-full h-16 bg-gray-200 rounded-xl text-right text-4xl px-4 outline-none mb-8">

        <!-- Operator Buttons -->
        <div class="grid grid-cols-4 gap-4 mb-6">

            <button class="animate-button bg-yellow-300 hover:bg-yellow-400 rounded-xl h-16 text-3xl transition-all duration-300">
                +
            </button>

            <button class="animate-button bg-yellow-300 hover:bg-yellow-400 rounded-xl h-16 text-3xl transition-all duration-300">
                −
            </button>

            <button class="animate-button bg-yellow-300 hover:bg-yellow-400 rounded-xl h-16 text-3xl transition-all duration-300">
                ×
            </button>

            <button class="animate-button bg-yellow-300 hover:bg-yellow-400 rounded-xl h-16 text-3xl transition-all duration-300">
                ÷
            </button>

        </div>

        <!-- Number Buttons -->
        <div class="grid grid-cols-4 gap-4">

            <button class="animate-button bg-blue-200 hover:bg-blue-300 rounded-xl h-16 text-3xl transition-all duration-300">7</button>

            <button class="animate-button bg-blue-200 hover:bg-blue-300 rounded-xl h-16 text-3xl transition-all duration-300">8</button>

            <button class="animate-button bg-blue-200 hover:bg-blue-300 rounded-xl h-16 text-3xl transition-all duration-300">9</button>

            <button class="animate-button bg-blue-200 hover:bg-blue-300 rounded-xl h-16 text-3xl transition-all duration-300">4</button>

            <button class="animate-button bg-blue-200 hover:bg-blue-300 rounded-xl h-16 text-3xl transition-all duration-300">5</button>

            <button class="animate-button bg-blue-200 hover:bg-blue-300 rounded-xl h-16 text-3xl transition-all duration-300">6</button>

            <button class="animate-button bg-blue-200 hover:bg-blue-300 rounded-xl h-16 text-3xl transition-all duration-300">1</button>

            <button class="animate-button bg-blue-200 hover:bg-blue-300 rounded-xl h-16 text-3xl transition-all duration-300">2</button>

            <button class="animate-button bg-blue-200 hover:bg-blue-300 rounded-xl h-16 text-3xl transition-all duration-300">3</button>

            <button class="animate-button bg-blue-200 hover:bg-blue-300 rounded-xl h-16 text-3xl transition-all duration-300">0</button>

            <button class="animate-button bg-blue-200 hover:bg-blue-300 rounded-xl h-16 text-3xl transition-all duration-300">.</button>

            <button class="animate-clear bg-red-500 hover:bg-red-600 text-white rounded-xl h-16 text-3xl transition-all duration-300">
                C
            </button>

        </div>

        <!-- Equal Button -->
        <button class="animate-equal w-full bg-emerald-500 hover:bg-emerald-600 text-white text-4xl rounded-xl h-16 mt-8 transition-all duration-300">
            =
        </button>

    </div>

</body>

</html>
